name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/youtube-transcription-setup-w39zzg
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Base path tracks the repo name, so renaming the repo (and thus the
          # Pages URL /<repo>/) never breaks asset paths.
          VITE_BASE: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site (build type: GitHub Actions) so no manual
          # settings toggle is required.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
