name: Security Scan

on:
  push:
    paths:
      - 'aegisflow/**'
  pull_request:
    paths:
      - 'aegisflow/**'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          PATTERNS=(
            'password\s*='
            'secret\s*='
            'api_key\s*='
            'token\s*='
            'private_key'
            'BEGIN RSA PRIVATE KEY'
            'BEGIN OPENSSH PRIVATE KEY'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rni "$pattern" aegisflow/ \
                --include='*.py' \
                --include='*.json' \
                --include='*.yaml' \
                --include='*.yml' \
                --exclude-dir='.git' \
                --exclude='security_scan.yml' 2>/dev/null; then
              echo "WARNING: Potential secret found matching pattern: $pattern"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "Security scan found potential secrets. Please review."
            exit 1
          fi
          echo "No hardcoded secrets detected."

      - name: Validate plugin permissions
        run: |
          echo "Checking plugin permissions..."
          python3 -c "
          import json
          with open('aegisflow/plugins/registry.json') as f:
              plugins = json.load(f)
          if isinstance(plugins, dict):
              plugins = plugins.get('plugins', [])
          VALID = {'external_api','database','filesystem','network','secrets','compute'}
          errors = []
          for p in plugins:
              for perm in p.get('permissions', []):
                  if perm not in VALID:
                      errors.append(f\"{p['name']}: invalid permission '{perm}'\")
              if 'secrets' in p.get('permissions', []):
                  print(f\"WARNING: {p['name']} requests 'secrets' permission\")
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              exit(1)
          print('All plugin permissions are valid.')
          "

      - name: Check file permissions
        run: |
          echo "Checking for overly permissive files..."
          find aegisflow/ -type f -perm /o+w 2>/dev/null | head -10
          echo "File permission check complete."
