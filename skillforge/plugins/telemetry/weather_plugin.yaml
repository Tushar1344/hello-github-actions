---
# SkillForge Telemetry Configuration
# Plugin: weather_plugin

plugin: weather_plugin
enabled: true

metrics:
  invocation_count: enabled
  latency_p95: enabled
  error_rate: enabled
  request_size_bytes: enabled
  response_size_bytes: enabled

slo:
  latency_p95_ms: 800
  error_rate_percent: 1

alerts:
  error_rate:
    condition: ">3% for 5m"
    severity: critical
    notify:
      - platform-team
  latency_p95:
    condition: ">1200ms for 10m"
    severity: warning
    notify:
      - platform-team

dashboards:
  - name: "Weather Plugin Overview"
    panels:
      - type: timeseries
        metric: invocation_count
        window: 1h
      - type: timeseries
        metric: latency_p95
        window: 1h
      - type: gauge
        metric: error_rate
        thresholds:
          warning: 1
          critical: 3

retention:
  raw_metrics: 7d
  aggregated_metrics: 90d
